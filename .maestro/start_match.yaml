appId: com.travaganza.soccerflow
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible: "See Sample Data"
    timeout: 10000
- tapOn: "See Sample Data"

- extendedWaitUntil:
    visible: "Phoenix FC"
    timeout: 5000

# Open Phoenix FC team detail
- tapOn: "Phoenix FC"
- extendedWaitUntil:
    visible: "Start Match"
    timeout: 5000

# Open match setup
- tapOn: "Start Match"
- extendedWaitUntil:
    visible: "New Match"
    timeout: 5000

# Set period duration: 40 → 5 min (−5 seven times)
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"
- tapOn: "Decrease period duration by 5 minutes"

# Set break duration: 15 → 1 min (−5 twice, then −1 four times)
- tapOn: "Decrease break duration by 5 minutes"
- tapOn: "Decrease break duration by 5 minutes"
- tapOn: "Decrease break duration by 1 minute"
- tapOn: "Decrease break duration by 1 minute"
- tapOn: "Decrease break duration by 1 minute"
- tapOn: "Decrease break duration by 1 minute"

# Start the match
- tapOn: "Start Match"
- extendedWaitUntil:
    visible: "Goal"
    timeout: 8000

# Confirm live match screen
- extendedWaitUntil:
    visible: "Adjust match timer"
    timeout: 5000

# Record a goal activity (home, no scorer)
- tapOn: "Goal"
- tapOn: "Record Goal"

# Increment home score to match the goal
- tapOn: "Increase home score"

# Finish the match
- tapOn: "Finish Match"
- tapOn: "Finish"

# Verify match record in history
- extendedWaitUntil:
    visible: "Phoenix FC vs Opponent, 1 to 0"
    timeout: 5000
